        // Camera variables
        let cameraStream = null;

        // UPI Payment QR Detection
        function detectUPIQRCode(text) {
            const upiPatterns = [
                // UPI Deep Link format
                { pattern: /upi:\/\/pay\?pa=([^&]+)&pn=([^&]+)/, type: 'UPI Deep Link' },
                { pattern: /payto:\/\/([^?]+)/, type: 'PayTo Link' },
                { pattern: /tez:\/\/[\s\S]*?pa=([^&]+)/, type: 'Google Pay' },
                { pattern: /phonepe:\/\/[\s\S]*?pa=([^&]+)/, type: 'PhonePe' },
                { pattern: /paytm:\/\/[\s\S]*?pa=([^&]+)/, type: 'Paytm' },
                { pattern: /bhim:\/\/[\s\S]*?pa=([^&]+)/, type: 'BHIM UPI' },
                
                // UPI ID format
                { pattern: /([a-zA-Z0-9._-]+@[a-zA-Z0-9]+)/, type: 'UPI ID' },
                
                // UPI payment parameters
                { pattern: /pa=([^&]+)/, type: 'UPI Parameter' },
                { pattern: /pn=([^&]+)/, type: 'Payee Name' },
                { pattern: /am=([^&]+)/, type: 'Amount' },
                { pattern: /cu=([^&]+)/, type: 'Currency' }
            ];

            let upiInfo = {
                isUPI: false,
                upiId: null,
                payeeName: null,
                amount: null,
                currency: 'INR',
                type: null,
                rawData: text
            };

        for (let pattern of upiPatterns) {
            const match = text.match(pattern.pattern);
            if (match) {
                upiInfo.isUPI = true;
                upiInfo.type = pattern.type;
                
                // Extract specific fields
                if (pattern.pattern.toString().includes('pa=')) {
                    const paMatch = text.match(/pa=([^&]+)/);
                    if (paMatch) upiInfo.upiId = decodeURIComponent(paMatch[1]);
                }
                
                if (pattern.pattern.toString().includes('pn=')) {
                    const pnMatch = text.match(/pn=([^&]+)/);
                    if (pnMatch) upiInfo.payeeName = decodeURIComponent(pnMatch[1]);
                }
                
                if (pattern.pattern.toString().includes('am=')) {
                    const amMatch = text.match(/am=([^&]+)/);
                    if (amMatch) upiInfo.amount = decodeURIComponent(amMatch[1]);
                }
                
                // If it's a simple UPI ID
                if (pattern.type === 'UPI ID' && !upiInfo.upiId) {
                    upiInfo.upiId = match[1];
                }
                
                break;
            }
        }

        return upiInfo;
    }

    // URL validation and extraction
    function extractURL(text) {
        // Regular expression to find URLs in text
        const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)|([a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}(?:\.[a-zA-Z]{2,})?)/g;
        const matches = text.match(urlRegex);
        return matches ? matches[0] : null;
    }

    function getDomainFromURL(url) {
        try {
            // Add protocol if missing
            if (!url.startsWith('http')) {
                url = 'http://' + url;
            }
            const urlObj = new URL(url);
            return urlObj.hostname;
        } catch {
            return url.split('/')[0];
        }
    }

    // UPI Fraud Detection
    function detectUPIFraud(upiInfo) {
        const threats = [];
        let confidence = 0;
        
        // Check for suspicious UPI patterns
        const suspiciousUPIPatterns = [
            { pattern: /@paytm|@okhdfcbank|@okaxis|@ybl|@ibl|@pingpay/i, threat: 'Common UPI handle', score: 10 },
            { pattern: /[0-9]{10}/, threat: 'Mobile number as UPI ID - verify carefully', score: 30 },
            { pattern: /gift|cashback|free|offer|prize|lottery|winner/i, threat: 'Suspicious UPI ID name', score: 50 },
            { pattern: /^[0-9]+$/, threat: 'Only numbers in UPI ID - possible scam', score: 40 }
        ];

        // Check UPI ID
        if (upiInfo.upiId) {
            suspiciousUPIPatterns.forEach(item => {
                if (item.pattern.test(upiInfo.upiId)) {
                    threats.push(item.threat);
                    confidence += item.score;
                }
            });
        }

        // Check for large amounts
        if (upiInfo.amount) {
            const amountNum = parseFloat(upiInfo.amount);
            if (amountNum > 10000) {
                threats.push(`Large amount detected: ₹${amountNum}`);
                confidence += 35;
            }
            if (amountNum > 50000) {
                threats.push('Very large transaction - verify carefully');
                confidence += 20;
            }
        }

        // Check payee name
        if (upiInfo.payeeName) {
            if (upiInfo.payeeName.includes('bank') || upiInfo.payeeName.includes('sbi') || upiInfo.payeeName.includes('hdfc')) {
                threats.push('Bank name in payee - verify if official');
                confidence += 25;
            }
        }

        // Determine result based on confidence
        if (confidence >= 70) {
            return {
                isSafe: false,
                result: '🚨 DANGEROUS UPI QR Code',
                explanation: 'High-risk UPI payment QR detected! Possible scam.',
                confidence: confidence,
                threats: threats,
                type: 'UPI',
                upiInfo: upiInfo
            };
        } else if (confidence >= 35) {
            return {
                isSafe: false,
                result: '⚠ SUSPICIOUS UPI QR Code',
                explanation: 'This UPI QR code shows suspicious patterns. Verify before payment.',
                confidence: confidence,
                threats: threats,
                type: 'UPI',
                upiInfo: upiInfo
            };
        } else {
            return {
                isSafe: true,
                result: '✅ SAFE UPI QR Code',
                explanation: 'This UPI QR code appears safe for payment.',
                confidence: confidence,
                threats: threats,
                type: 'UPI',
                upiInfo: upiInfo
            };
        }
    }

    
    // ========== MAIN DETECT FUNCTION (URL → API, UPI → JS) ==========
    
    async function detectFraud(url, qrData) {
        // Check if it's UPI QR code
        const upiInfo = detectUPIQRCode(qrData);
        
        if (upiInfo.isUPI) {
            // UPI - JavaScript detection
            return detectUPIFraud(upiInfo);
        } else {
            // URL - ONLY Flask ML Model API
            if (url) {
                try {
                    console.log("Calling API for URL:", url);
                    
                    const response = await fetch('/scan-qr-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ qr_data: qrData })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log("API Response:", data);
                        
                        return {
                            isSafe: data.result.includes('Safe'),
                            result: data.result,
                            explanation: Array.isArray(data.explanation) ? data.explanation.join(', ') : data.explanation,
                            confidence: 50,
                            type: 'URL',
                            url: url,
                            threats: []
                        };
                    } else {
                        throw new Error('API returned error');
                    }
                } catch (error) {
                    console.error('API Error:', error);
                    showToast('Cannot connect to ML model. Please check if server is running.', 'error');
                    
                    return {
                        isSafe: false,
                        result: '❌ ML MODEL ERROR',
                        explanation: 'Unable to connect to fraud detection service. Please make sure Flask server is running on port 5000.',
                        confidence: 0,
                        type: 'ERROR',
                        url: url
                    };
                }
            } else {
                // No URL found
                return {
                    isSafe: true,
                    result: '📝 Text QR Code',
                    explanation: 'This QR code contains text, not a URL.',
                    confidence: 0,
                    threats: [],
                    type: 'TEXT',
                    text: qrData
                };
            }
        }
    }

    // Display result
    function displayResult(result, url, qrData) {
        const container = document.getElementById('resultContainer');
        const resultClass = result.result.includes('SAFE') ? 'safe' : 
                          (result.result.includes('SUSPICIOUS') ? 'suspicious' : 
                          (result.result.includes('DANGEROUS') ? 'dangerous' : 'safe'));
        
        let threatsHTML = '';
        if (result.threats && result.threats.length > 0) {
            threatsHTML = `
                <div style="margin-top: 15px;">
                    <strong>⚠️ Detected Issues:</strong>
                    <ul style="margin-top: 8px; padding-left: 20px;">
                        ${result.threats.map(t => `<li style="margin-bottom: 5px;">${t}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // UPI specific display
        let upiHTML = '';
        if (result.type === 'UPI' && result.upiInfo) {
            upiHTML = `
                <div style="background: linear-gradient(135deg, #667eea10, #764ba210); padding: 15px; border-radius: 15px; margin: 15px 0;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <i class="fas fa-university" style="color: #667eea;"></i>
                        <span style="font-weight: 600;">UPI Payment Details</span>
                    </div>
                    ${result.upiInfo.upiId ? `<div style="margin: 5px 0;"><strong>UPI ID:</strong> ${result.upiInfo.upiId}</div>` : ''}
                    ${result.upiInfo.payeeName ? `<div style="margin: 5px 0;"><strong>Payee:</strong> ${result.upiInfo.payeeName}</div>` : ''}
                    ${result.upiInfo.amount ? `<div style="margin: 5px 0;"><strong>Amount:</strong> ₹${result.upiInfo.amount}</div>` : ''}
                    <div style="margin: 5px 0;"><strong>Type:</strong> ${result.upiInfo.type || 'UPI QR'}</div>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="result-card" id="result-card">
                <div class="result-header">
                    <div class="result-icon ${resultClass}">
                        <i class="fas ${result.result.includes('SAFE') ? 'fa-check-circle' : 
                                          (result.result.includes('SUSPICIOUS') ? 'fa-exclamation-triangle' : 
                                          (result.result.includes('DANGEROUS') ? 'fa-skull-crossbones' : 'fa-info-circle'))}"></i>
                    </div>
                    <div class="result-title" style="font-weight: 600;">Scan Result</div>
                    <span class="result-badge ${resultClass}">
                        ${result.result}
                    </span>
                </div>

                ${result.type === 'UPI' ? upiHTML : ''}

                <div style="margin-bottom: 15px;">
                    <div style="font-size: 14px; color: #666;">Risk Score:</div>
                    <div style="height: 8px; background: #f0f3fa; border-radius: 4px; margin-top: 5px;">
                        <div style="width: ${result.confidence}%; height: 100%; background: ${result.confidence >= 70 ? '#dc3545' : (result.confidence >= 35 ? '#ffc107' : '#28a745')}; border-radius: 4px;"></div>
                    </div>
                    <div style="text-align: right; font-size: 12px; margin-top: 3px;">${result.confidence}% risk</div>
                </div>

                ${result.type === 'URL' && url ? `
                <div class="url-box">
                    <strong>📎 Extracted URL:</strong><br>
                    <a href="${url}" target="_blank" style="color: #667eea; text-decoration: none;">${url}</a>
                    <div style="margin-top: 8px;">
                        <span class="url-domain">${getDomainFromURL(url)}</span>
                    </div>
                </div>
                ` : ''}

                ${result.type === 'TEXT' ? `
                <div class="url-box">
                    <strong>📝 QR Content:</strong><br>
                    ${qrData}
                </div>
                ` : ''}

                <div class="explanation-box ${resultClass}">
                    <strong>🔍 AI Analysis:</strong><br>
                    ${result.explanation}
                    ${threatsHTML}
                </div>

                <div class="action-buttons">
                    <button class="action-btn primary" onclick="window.location.reload()">
                        <i class="fas fa-redo"></i> Scan Again
                    </button>
                    
                    ${result.type === 'UPI' ? `
                        <button class="action-btn ${result.isSafe ? 'secondary' : 'danger'}" onclick="showUPIWarning('${result.upiInfo.upiId}', ${result.confidence})">
                            <i class="fas fa-university"></i> ${result.isSafe ? 'Pay via UPI' : 'Pay with Caution'}
                        </button>
                    ` : ''}
                    
                    ${result.type === 'URL' && url ? `
                        <button class="action-btn ${result.isSafe ? 'secondary' : 'danger'}" onclick="visitURL('${url}')">
                            <i class="fas fa-external-link-alt"></i> ${result.isSafe ? 'Visit URL' : 'Visit at Own Risk'}
                        </button>
                    ` : ''}
                    
                    <button class="action-btn secondary" onclick="shareResult('${result.result}', '${url || qrData || ''}')">
                        <i class="fas fa-share-alt"></i> Share
                    </button>
                </div>
            </div>
        `;

        // Hide spinner and show result
        document.getElementById('spinner').style.display = 'none';
    }

    // Show UPI warning before payment
    function showUPIWarning(upiId, riskScore) {
        const warning = riskScore > 50 ? 
            '⚠️ HIGH RISK: This UPI QR code shows suspicious patterns. Are you sure you want to proceed?' :
            '💳 Proceed with UPI payment? Verify the payee details carefully.';
        
        if (confirm(warning)) {
            // Open UPI payment app
            const upiIntent = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=Merchant&cu=INR`;
            window.location.href = upiIntent;
        }
    }
    // Handle upload form submission (UPDATED for async ML call)
    async function handleUpload(event) {
        event.preventDefault();
        
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files || !fileInput.files[0]) {
            showToast('Please select an image first', 'error');
            return;
        }

        const file = fileInput.files[0];
        
        // Show loading
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('spinner').style.display = 'block';
        
        try {
            // Read image file
            const imageData = await readImageFile(file);
            
            // Extract QR code
            const qrData = await extractQRFromImage(imageData);
            
            if (!qrData) {
                showToast('No QR code found in the image', 'error');
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('upload-section').style.display = 'block';
                return;
            }

            // Extract URL if present
            const url = extractURL(qrData);
            
            // Show URL preview
            if (url) {
                document.getElementById('uploadUrlText').textContent = url;
                document.getElementById('uploadUrlDomain').textContent = getDomainFromURL(url);
                document.getElementById('uploadUrlPreview').style.display = 'block';
            }

            // Detect fraud (async - now calls ML for URLs)
            const result = await detectFraud(url, qrData);
            
            // Display result
            displayResult(result, url, qrData);
            
        } catch (error) {
            console.error('Error:', error);
            showToast('Error processing image', 'error');
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('upload-section').style.display = 'block';
        }
    }

    // Read image file as base64
    function readImageFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // Extract QR from image
    function extractQRFromImage(imageData) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                resolve(code ? code.data : null);
            };
            img.src = imageData;
        });
    }

    // Switch between upload and camera mode
    function switchMode(mode) {
        const uploadSection = document.getElementById('upload-section');
        const cameraSection = document.getElementById('camera-section');
        const uploadBtn = document.getElementById('upload-mode-btn');
        const cameraBtn = document.getElementById('camera-mode-btn');

        if (mode === 'upload') {
            uploadSection.classList.remove('hidden');
            cameraSection.classList.remove('active');
            uploadBtn.classList.add('active');
            cameraBtn.classList.remove('active');
            stopCamera();
        } else {
            uploadSection.classList.add('hidden');
            cameraSection.classList.add('active');
            uploadBtn.classList.remove('active');
            cameraBtn.classList.add('active');
            startCamera();
        }
    }

    // Start camera for auto scanning
    async function startCamera() {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            
            videoElement.srcObject = cameraStream;
            videoElement.play();
            
            // Start auto scanning
            scanning = true;
            scanInterval = setInterval(scanQRCode, 500); // Scan every 500ms
            
            document.getElementById('camera-status').innerHTML = '<i class="fas fa-circle"></i> Looking for QR code...';
            
        } catch (error) {
            console.error('Camera error:', error);
            showToast('Could not access camera. Please check permissions.', 'error');
        }
    }

    // Stop camera
    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
            videoElement.srcObject = null;
            scanning = false;
            
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }
    }

        // Auto scan QR code from camera feed (UPDATED for async ML call)
    async function scanQRCode() {
        if (!scanning || !videoElement.videoWidth) return;

        // Set canvas size to match video
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        // Draw video frame to canvas
        canvasContext.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
        
        // Get image data for QR detection
        const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);
        
        // Use jsQR to detect QR code
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
        });

        if (code && code.data !== lastScannedData) {
            // New QR code found!
            lastScannedData = code.data;
            const qrData = code.data;
            
            // Extract URL if present
            const url = extractURL(qrData);
            
            // Check if UPI
            const upiInfo = detectUPIQRCode(qrData);
            
            // Show preview based on type
            if (upiInfo.isUPI) {
                document.getElementById('cameraUrlPreview').style.display = 'block';
                document.getElementById('cameraUrlText').innerHTML = `
                    <i class="fas fa-university"></i> UPI Payment QR<br>
                    <small>UPI ID: ${upiInfo.upiId || 'N/A'}</small>
                `;
            } else if (url) {
                document.getElementById('cameraUrlText').textContent = url;
                document.getElementById('cameraUrlDomain').textContent = getDomainFromURL(url);
                document.getElementById('cameraUrlPreview').style.display = 'block';
            } else {
                document.getElementById('cameraUrlPreview').style.display = 'none';
            }

            // Update status
            document.getElementById('camera-status').innerHTML = '<i class="fas fa-check-circle"></i> QR Code detected! Analyzing...';
            
            // Pause scanning
            scanning = false;
            clearInterval(scanInterval);
            
            // Stop camera
            stopCamera();
            
            // Show loading
            document.getElementById('spinner').style.display = 'block';
            document.querySelector('.camera-section').style.display = 'none';
            
            // Detect fraud (async - now calls ML for URLs)
            const result = await detectFraud(url, qrData);
            
            // Display result
            displayResult(result, url, qrData);
        }
    }

    // Update filename when file selected
    function updateFileName(input) {
        const fileName = document.getElementById('fileName');
        if (input.files && input.files[0]) {
            fileName.innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> ' + input.files[0].name;
            
            // Auto preview QR from selected image
            previewQRFromImage(input.files[0]);
        } else {
            fileName.innerHTML = '<i class="far fa-image"></i> No file chosen';
            document.getElementById('uploadUrlPreview').style.display = 'none';
        }
    }

    // Preview QR from selected image
    async function previewQRFromImage(file) {
        try {
            const imageData = await readImageFile(file);
            const img = new Image();
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    const url = extractURL(code.data);
                    const upiInfo = detectUPIQRCode(code.data);
                    
                    if (upiInfo.isUPI) {
                        document.getElementById('uploadUrlText').innerHTML = `
                            <i class="fas fa-university"></i> UPI Payment QR<br>
                            <small>UPI ID: ${upiInfo.upiId || 'N/A'}</small>
                        `;
                        document.getElementById('uploadUrlPreview').style.display = 'block';
                    } else if (url) {
                        document.getElementById('uploadUrlText').textContent = url;
                        document.getElementById('uploadUrlDomain').textContent = getDomainFromURL(url);
                        document.getElementById('uploadUrlPreview').style.display = 'block';
                    }
                }
            };
            img.src = imageData;
        } catch (error) {
            console.error('Preview error:', error);
        }
    }

    // Show toast notification
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = type === 'error' ? '#dc3545' : '#333';
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // Share result
    function shareResult(result, content) {
        if (navigator.share) {
            navigator.share({
                title: 'SecureScan 360 Result',
                text: `QR Scan Result: ${result}\nContent: ${content}`,
                url: window.location.href
            }).catch(() => {
                showToast('Share cancelled');
            });
        } else {
            // Fallback - copy to clipboard
            navigator.clipboard.writeText(`SecureScan 360 Result: ${result}\nContent: ${content}`);
            showToast('Copied to clipboard!');
        }
    }

    // Visit URL with warning
    function visitURL(url) {
        if (!url.startsWith('http')) {
            url = 'https://' + url;
        }
        window.open(url, '_blank');
    }

    // Drag and drop for upload
    const uploadArea = document.querySelector('.upload-area');
    if (uploadArea) {
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#764ba2';
            uploadArea.style.background = '#f0f3fa';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%)';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('file-input').files = e.dataTransfer.files;
                updateFileName(document.getElementById('file-input'));
            }
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%)';
        });
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        stopCamera();
    });
</script>
